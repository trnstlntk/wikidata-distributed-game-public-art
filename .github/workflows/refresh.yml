name: Refresh tiles

on:
  schedule:
    # Runs every Monday at 03:00 UTC. Edit if you want a different schedule.
    - cron: '0 3 * * 1'
  workflow_dispatch:  # lets you trigger it manually from the Actions tab

jobs:
  refresh:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # needed so the bot can push the updated tiles.json
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Fetch latest candidate artworks
        run: node scripts/refresh-tiles.mjs

      - name: Commit updated tiles
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/tiles.json
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Refresh tiles $(date -u +%Y-%m-%d)"
            git push
          fi
